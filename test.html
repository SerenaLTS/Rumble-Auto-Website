<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three Model Orbit Test</title>
  <style>
    :root {
      --ink: #111722;
      --muted: #5d6674;
      --blue: #2f64f6;
      --line: #dfe4ec;
      --shadow: 0 26px 70px rgba(13, 24, 42, .14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #fff;
    }

    .test-section {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 70px 28px;
      overflow: hidden;
      background: linear-gradient(180deg, #ffffff 0%, #f7f9fd 100%);
    }

    .test-shell {
      width: min(1260px, 100%);
      display: grid;
      grid-template-columns: minmax(330px, .78fr) minmax(560px, 1.22fr);
      gap: 56px;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--blue);
      font-size: 14px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 620px;
      font-size: clamp(42px, 5vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    .intro {
      margin: 24px 0 0;
      max-width: 580px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .orbit-stage {
      position: relative;
      min-height: 620px;
      display: grid;
      place-items: center;
      perspective: 1300px;
    }

    .orbit-shadow {
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 90px;
      height: 130px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(13, 24, 42, .18), rgba(13, 24, 42, .07) 44%, transparent 72%);
      filter: blur(4px);
      transform: rotateX(66deg);
    }

    .orbit-ring {
      position: relative;
      width: min(720px, 86vw);
      height: 500px;
      transform-style: preserve-3d;
      animation: spin 15s linear infinite;
    }

    .orbit-card {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 390px;
      min-height: 300px;
      margin: -150px 0 0 -195px;
      border: 1px solid rgba(220, 226, 236, .95);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(247,249,253,.92));
      box-shadow: var(--shadow);
      overflow: hidden;
      transform-style: preserve-3d;
      animation: keep-facing 15s linear infinite;
    }

    .orbit-card:nth-child(1) {
      transform: rotateY(0deg) translateZ(255px);
    }

    .orbit-card:nth-child(2) {
      transform: rotateY(120deg) translateZ(255px);
    }

    .orbit-card:nth-child(3) {
      transform: rotateY(240deg) translateZ(255px);
    }

    .orbit-card::before {
      content: "";
      position: absolute;
      left: 42px;
      right: 42px;
      top: 172px;
      height: 34px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(13, 24, 42, .22), transparent 70%);
      filter: blur(6px);
    }

    .orbit-card img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 220px;
      object-fit: contain;
      padding: 20px 22px 8px;
      display: block;
      filter: drop-shadow(0 18px 22px rgba(13, 24, 42, .16));
    }

    .card-copy {
      position: relative;
      z-index: 2;
      padding: 18px 24px 24px;
      background: rgba(255, 255, 255, .72);
      border-top: 1px solid rgba(223, 228, 236, .7);
    }

    .card-copy span {
      display: block;
      color: #98a2b3;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .card-copy strong {
      display: block;
      margin-top: 8px;
      font-size: 25px;
      line-height: 1.05;
    }

    .center-mark {
      position: absolute;
      z-index: 5;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      color: #fff;
      background: #101827;
      box-shadow: 0 22px 60px rgba(16, 24, 39, .22);
    }

    .center-mark strong {
      display: block;
      font-size: 25px;
      letter-spacing: .02em;
    }

    .center-mark span {
      display: block;
      margin-top: 6px;
      color: rgba(255,255,255,.68);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      color: #778195;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @keyframes spin {
      from {
        transform: rotateX(-7deg) rotateY(0deg);
      }

      to {
        transform: rotateX(-7deg) rotateY(-360deg);
      }
    }

    @keyframes keep-facing {
      from {
        rotate: y 0deg;
      }

      to {
        rotate: y 360deg;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .orbit-ring,
      .orbit-card {
        animation: none;
      }
    }

    @media (max-width: 980px) {
      .test-shell {
        grid-template-columns: 1fr;
      }

      .orbit-stage {
        min-height: 560px;
      }
    }

    @media (max-width: 640px) {
      .test-section {
        padding: 48px 18px;
      }

      .orbit-stage {
        min-height: 500px;
        margin-inline: -18px;
      }

      .orbit-ring {
        width: 100vw;
        height: 420px;
      }

      .orbit-card {
        width: 292px;
        min-height: 246px;
        margin: -123px 0 0 -146px;
      }

      .orbit-card:nth-child(1) {
        transform: rotateY(0deg) translateZ(180px);
      }

      .orbit-card:nth-child(2) {
        transform: rotateY(120deg) translateZ(180px);
      }

      .orbit-card:nth-child(3) {
        transform: rotateY(240deg) translateZ(180px);
      }

      .orbit-card img {
        height: 164px;
        padding: 14px 16px 4px;
      }

      .orbit-card::before {
        top: 128px;
      }

      .card-copy {
        padding: 14px 18px 18px;
      }

      .card-copy strong {
        font-size: 20px;
      }

      .center-mark {
        width: 118px;
        height: 118px;
      }

      .center-mark strong {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="test-section">
    <section class="test-shell" aria-label="Three SITRAK model orbit carousel">
      <div>
        <p class="eyebrow">Truck Range</p>
        <h1>Explore our three core SITRAK series.</h1>
        <p class="intro">Three clean model cards orbit around the centre, using only the exact PNG images you selected.</p>
      </div>

      <div class="orbit-stage">
        <div class="orbit-shadow"></div>
        <div class="center-mark">
          <div>
            <strong>G5 G7 C9</strong>
            <span>Series</span>
          </div>
        </div>
        <div class="orbit-ring">
          <article class="orbit-card">
            <img src="assets/models/g5s-4x2-cargo-cab-chassis.png" alt="SITRAK G5S 4x2 Cargo Cab and Chassis" />
            <div class="card-copy">
              <span>G5 Series</span>
              <strong>G5S 4x2 Cargo</strong>
            </div>
          </article>
          <article class="orbit-card">
            <img src="assets/models/g7s-6x4-tipper-cab-chassis.png" alt="SITRAK G7S 6x4 Tipper Cab and Chassis" />
            <div class="card-copy">
              <span>G7 Series</span>
              <strong>G7S 6x4 Tipper</strong>
            </div>
          </article>
          <article class="orbit-card">
            <img src="assets/models/c9h-6x4-prime-mover.png" alt="SITRAK C9H 6x4 Prime Mover" />
            <div class="card-copy">
              <span>C9 Series</span>
              <strong>C9H 6x4 Prime</strong>
            </div>
          </article>
        </div>
        <div class="hint">orbit carousel test</div>
      </div>
    </section>
  </main>
</body>
</html>
