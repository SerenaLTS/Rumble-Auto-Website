<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUMBLE Model Carousel Test</title>
  <style>
    :root {
      --ink: #111722;
      --muted: #5b6574;
      --blue: #2f64f6;
      --line: #dfe4ec;
      --soft: #f5f7fb;
      --shadow: 0 28px 80px rgba(13, 24, 42, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #fff;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .range-test {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 76px 28px;
      overflow: hidden;
      background: linear-gradient(180deg, #fff 0%, #f8fafc 100%);
    }

    .range-shell {
      width: min(1320px, 100%);
      display: grid;
      grid-template-columns: minmax(330px, .74fr) minmax(600px, 1.26fr);
      gap: 58px;
      align-items: center;
    }

    .eyebrow {
      margin: 0 0 20px;
      color: var(--blue);
      font-size: 14px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 620px;
      font-size: clamp(42px, 5vw, 74px);
      line-height: .99;
      letter-spacing: 0;
    }

    .range-copy {
      margin: 26px 0 0;
      max-width: 590px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .range-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .pill {
      min-height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 0;
      padding: 0 24px;
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
    }

    .pill.primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 14px 34px rgba(47, 100, 246, .22);
    }

    .pill.secondary {
      border: 1px solid var(--line);
      background: #fff;
      color: #111722;
    }

    .carousel-wrap {
      position: relative;
      min-height: 620px;
      display: grid;
      align-items: center;
      overflow: hidden;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 76%, rgba(13, 24, 42, .11), transparent 32%),
        linear-gradient(180deg, #f9fbfe 0%, #eef3fa 100%);
      border: 1px solid #e4e9f2;
      box-shadow: 0 24px 80px rgba(13, 24, 42, .08);
    }

    .carousel-viewport {
      position: relative;
      height: 480px;
      cursor: grab;
      touch-action: pan-y;
      user-select: none;
    }

    .carousel-viewport.is-dragging {
      cursor: grabbing;
    }

    .model-card {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(430px, 56vw);
      min-height: 332px;
      display: grid;
      grid-template-rows: 220px auto;
      border: 1px solid rgba(218, 225, 236, .9);
      border-radius: 22px;
      background: rgba(255, 255, 255, .92);
      box-shadow: var(--shadow);
      overflow: hidden;
      transform: translate(-50%, -50%);
      transition: transform .42s ease, opacity .42s ease, filter .42s ease;
      will-change: transform, opacity;
    }

    .model-card:before {
      content: "";
      position: absolute;
      left: 42px;
      right: 42px;
      top: 172px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(13, 24, 42, .22), transparent 68%);
      filter: blur(6px);
      z-index: 0;
    }

    .model-card img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 220px;
      object-fit: contain;
      padding: 18px 20px 8px;
      display: block;
      filter: drop-shadow(0 18px 24px rgba(13, 24, 42, .15));
      pointer-events: none;
    }

    .model-copy {
      position: relative;
      z-index: 2;
      display: grid;
      gap: 12px;
      padding: 20px 24px 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .72), #fff);
    }

    .model-copy span {
      color: #98a2b3;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .model-copy strong {
      font-size: 28px;
      line-height: 1;
    }

    .model-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.36;
    }

    .carousel-controls {
      position: absolute;
      left: 28px;
      right: 28px;
      bottom: 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      z-index: 8;
    }

    .arrow-group {
      display: flex;
      gap: 10px;
    }

    .arrow-btn {
      width: 50px;
      height: 50px;
      border: 1px solid #d8e0ec;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: #fff;
      color: #111722;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(13, 24, 42, .08);
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border: 0;
      border-radius: 999px;
      padding: 0;
      background: #b9c3d2;
      cursor: pointer;
      transition: width .2s ease, background .2s ease;
    }

    .dot.is-active {
      width: 28px;
      background: var(--blue);
    }

    .model-count {
      color: #697386;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 1020px) {
      .range-shell {
        grid-template-columns: 1fr;
      }

      .carousel-wrap {
        min-height: 560px;
      }
    }

    @media (max-width: 640px) {
      .range-test {
        padding: 48px 18px;
      }

      .range-actions {
        flex-direction: column;
      }

      .pill {
        width: 100%;
      }

      .carousel-wrap {
        min-height: 520px;
        border-radius: 22px;
      }

      .carousel-viewport {
        height: 410px;
      }

      .model-card {
        width: min(312px, 82vw);
        min-height: 274px;
        grid-template-rows: 170px auto;
      }

      .model-card img {
        height: 170px;
      }

      .model-card:before {
        top: 132px;
      }

      .model-copy {
        padding: 16px 18px 20px;
      }

      .model-copy strong {
        font-size: 22px;
      }

      .carousel-controls {
        left: 18px;
        right: 18px;
        bottom: 20px;
        align-items: flex-end;
      }

      .dots {
        display: none;
      }

      .arrow-btn {
        width: 46px;
        height: 46px;
      }
    }
  </style>
</head>
<body>
  <main class="range-test">
    <section class="range-shell" aria-label="SITRAK model carousel concept">
      <div>
        <p class="eyebrow">Truck Range</p>
        <h1>Explore our SITRAK models in motion.</h1>
        <p class="range-copy">This test uses the PNG model images currently inside <strong>assets/models</strong>. Drag the trucks, use the arrows, or click the dots to move through the range.</p>
        <div class="range-actions">
          <a class="pill primary" href="models.html">Open Models Page</a>
          <a class="pill secondary" href="index.html">Back to Home</a>
        </div>
      </div>

      <div class="carousel-wrap">
        <div class="carousel-viewport" id="carousel" aria-label="Draggable SITRAK model carousel" tabindex="0"></div>
        <div class="carousel-controls">
          <div class="arrow-group">
            <button class="arrow-btn" type="button" data-dir="-1" aria-label="Previous model">‹</button>
            <button class="arrow-btn" type="button" data-dir="1" aria-label="Next model">›</button>
          </div>
          <div class="dots" id="dots" aria-label="Model carousel navigation"></div>
          <div class="model-count" id="count">01 / 10</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const models = [
      {
        series: "G5 Series",
        title: "G5S 4x2 Cargo",
        desc: "Cargo Cab & Chassis",
        image: "assets/models/g5s-4x2-cargo-cab-chassis.png"
      },
      {
        series: "G5 Series",
        title: "G5S 6x4 Cargo",
        desc: "Cargo Cab & Chassis",
        image: "assets/models/g5s-6x4-cargo-cab-chassis.png"
      },
      {
        series: "G5 Series",
        title: "G5S 8x4 Cargo",
        desc: "Cargo Cab & Chassis",
        image: "assets/models/g5s-8x4-cargo-cab-chassis.png"
      },
      {
        series: "G5 Series",
        title: "G5S 8x4 Mixer",
        desc: "Mixer Cab & Chassis",
        image: "assets/models/g5s-8x4-mixer-cab-chassis.png"
      },
      {
        series: "G5 Series",
        title: "G5S 6x4 Tipper",
        desc: "Tipper Cab & Chassis",
        image: "assets/models/g5s-6x4-tipper-cab-chassis.png"
      },
      {
        series: "G5 Series",
        title: "G5S 8x4 Tipper",
        desc: "Tipper Cab & Chassis",
        image: "assets/models/g5s-8x4-tipper-cab-chassis.png"
      },
      {
        series: "G7 Series",
        title: "G7S 6x4 Prime",
        desc: "Prime Mover",
        image: "assets/models/g7s-6x4-prime-mover.png"
      },
      {
        series: "G7 Series",
        title: "G7S 6x4 Tipper",
        desc: "Tipper Cab & Chassis",
        image: "assets/models/g7s-6x4-tipper-cab-chassis.png"
      },
      {
        series: "G7 Series",
        title: "G7S 8x4 Tipper",
        desc: "Tipper Cab & Chassis",
        image: "assets/models/g7s-8x4-tipper-cab-chassis.png"
      },
      {
        series: "C9 Series",
        title: "C9H 6x4 Prime",
        desc: "Prime Mover",
        image: "assets/models/c9h-6x4-prime-mover.png"
      }
    ];

    const carousel = document.getElementById("carousel");
    const dots = document.getElementById("dots");
    const count = document.getElementById("count");
    let active = 0;
    let startX = 0;
    let deltaX = 0;
    let dragging = false;

    models.forEach((model, index) => {
      const card = document.createElement("article");
      card.className = "model-card";
      card.innerHTML = `
        <img src="${model.image}" alt="${model.title}">
        <div class="model-copy">
          <span>${model.series}</span>
          <strong>${model.title}</strong>
          <p>${model.desc}</p>
        </div>
      `;
      carousel.appendChild(card);

      const dot = document.createElement("button");
      dot.className = "dot";
      dot.type = "button";
      dot.setAttribute("aria-label", `Show ${model.title}`);
      dot.addEventListener("click", () => {
        active = index;
        updateCarousel();
      });
      dots.appendChild(dot);
    });

    const cards = [...document.querySelectorAll(".model-card")];
    const dotButtons = [...document.querySelectorAll(".dot")];

    function wrapIndex(index) {
      return (index + models.length) % models.length;
    }

    function shortestOffset(index) {
      let offset = index - active;
      const half = models.length / 2;
      if (offset > half) offset -= models.length;
      if (offset < -half) offset += models.length;
      return offset;
    }

    function updateCarousel() {
      cards.forEach((card, index) => {
        const offset = shortestOffset(index);
        const abs = Math.abs(offset);
        const x = offset * 235 + deltaX;
        const scale = Math.max(.72, 1 - abs * .13);
        const rotate = offset * -8;
        const opacity = abs > 3 ? 0 : Math.max(.22, 1 - abs * .26);
        const z = 20 - abs;

        card.style.transform = `translate(calc(-50% + ${x}px), -50%) scale(${scale}) rotate(${rotate}deg)`;
        card.style.opacity = opacity;
        card.style.zIndex = z;
        card.style.filter = abs === 0 ? "none" : "saturate(.88)";
        card.setAttribute("aria-hidden", abs > 0 ? "true" : "false");
      });

      dotButtons.forEach((dot, index) => {
        dot.classList.toggle("is-active", index === active);
      });
      count.textContent = `${String(active + 1).padStart(2, "0")} / ${String(models.length).padStart(2, "0")}`;
    }

    function move(dir) {
      active = wrapIndex(active + dir);
      deltaX = 0;
      updateCarousel();
    }

    document.querySelectorAll("[data-dir]").forEach((button) => {
      button.addEventListener("click", () => move(Number(button.dataset.dir)));
    });

    carousel.addEventListener("pointerdown", (event) => {
      dragging = true;
      startX = event.clientX;
      deltaX = 0;
      carousel.classList.add("is-dragging");
      carousel.setPointerCapture(event.pointerId);
    });

    carousel.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      deltaX = event.clientX - startX;
      updateCarousel();
    });

    carousel.addEventListener("pointerup", () => {
      if (!dragging) return;
      dragging = false;
      carousel.classList.remove("is-dragging");
      if (Math.abs(deltaX) > 72) {
        move(deltaX < 0 ? 1 : -1);
      } else {
        deltaX = 0;
        updateCarousel();
      }
    });

    carousel.addEventListener("pointercancel", () => {
      dragging = false;
      deltaX = 0;
      carousel.classList.remove("is-dragging");
      updateCarousel();
    });

    carousel.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") move(-1);
      if (event.key === "ArrowRight") move(1);
    });

    updateCarousel();
  </script>
</body>
</html>
